<div class="dashboard">
  <header class="page-header">
    <div>
      <h1>Dashboard</h1>
      <p class="subtitle">Mint-style overview of debt, cash, income, and activity</p>
    </div>
    <button class="btn btn-primary" (click)="connectBank()" [disabled]="connectingBank || preparingPlaid">
      {{ preparingPlaid ? 'Preparing...' : connectingBank ? 'Connecting...' : 'Connect Bank' }}
    </button>
  </header>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>
  <div *ngIf="loading" class="loading">Loading dashboard...</div>

  <ng-container *ngIf="!loading">
    <app-dashboard-summary
      [netWorth]="summary.netWorth"
      [totalDebt]="summary.totalDebt"
      [monthlyIncome]="income.totalMonthlyIncome"
      [nextPaycheckAmount]="income.nextPaycheckAmount"
      [nextPaycheckDate]="income.nextPaycheckDate"
    />

    <section class="metrics-strip">
      <article>
        <p class="label">Total Assets</p>
        <p class="value">{{ totalAssets | currency }}</p>
      </article>
      <article>
        <p class="label">Debt Utilization</p>
        <p class="value">{{ debtUtilization | number: '1.0-0' }}%</p>
      </article>
      <article>
        <p class="label">Monthly Interest (Est.)</p>
        <p class="value">{{ totalMonthlyInterest | currency }}</p>
      </article>
    </section>

    <section class="charts-grid">
      <app-debt-chart [creditAccounts]="creditAccounts" />
      <app-payoff-chart [creditAccounts]="creditAccounts" />
    </section>

    <section class="full-width-section">
      <app-cashflow-forecast [forecast]="cashflowForecast" />
    </section>

    <section class="full-width-section">
      <app-paycheck-planner [planner]="paycheckPlanner" [accounts]="accounts" />
    </section>

    <section class="full-width-section">
      <app-accounts-table [accounts]="accounts" />
    </section>

    <section class="tables-grid">
      <app-transactions-table [transactions]="transactions" />
      <app-income-summary [income]="income" />
    </section>
  </ng-container>
</div>
