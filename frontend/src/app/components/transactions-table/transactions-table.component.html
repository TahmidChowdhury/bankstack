<section class="panel">
  <header>
    <h3>Recent Transactions</h3>
    <p>Latest 10 posted transactions</p>
  </header>

  <div class="table-wrap" *ngIf="transactions.length; else empty">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Merchant</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Account</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let txn of transactions">
          <td>{{ txn.date | date: 'MMM d, y' }}</td>
          <td>{{ txn.merchantName || txn.description || '—' }}</td>
          <td>{{ txn.category || '—' }}</td>
          <td>{{ txn.amount | currency }}</td>
          <td>{{ txn.account.name || '—' }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #empty>
    <p class="empty">No transactions yet.</p>
  </ng-template>
</section>
